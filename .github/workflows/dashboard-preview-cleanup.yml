# The name of the deployment
name: Delete preview environments on PR close

# DISABLED: This workflow is currently disabled
# When this action will be executed
on:
  # pull_request:
  #   types: [closed]
  #   paths:
  #     - 'web/dashboard/**'
  #     - '.github/workflows/dashboard-preview-cleanup.yml'
  workflow_dispatch:

env:
  PR_NUMBER: ${{ github.event.number }}

jobs:
  delete-preview:
    name: Delete Neon and Container App
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.DEMOETHEREALNEXUS_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DEMOETHEREALNEXUS_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DEMOETHEREALNEXUS_AZURE_SUBSCRIPTION_ID }}

      - name: Delete Container App
        run: |
          az containerapp delete --yes -g RG-Ethereal-Nexus -n ethereal-nexus-app-$PR_NUMBER
